<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ventilador Interactivo - Físicas de Aire</title>
    <style>
        :root {
            --bg-color-1: #e0eaf5;
            --bg-color-2: #b8c6db;
            --fan-color-main: #2a2a35;
            --fan-color-light: #3f3f4e;
            --fan-color-dark: #15151b;
            --blade-color: #d1d5db;
            --grill-color: rgba(200, 205, 215, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
            transition: background 0.5s ease;
            touch-action: none;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- CONTENEDORES DE FÍSICA --- */
        #papers-container, #particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* --- VENTILADOR --- */
        #fan-wrapper {
            position: relative;
            width: 300px;
            height: 400px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            will-change: transform;
        }

        /* Sombra de la base */
        .fan-shadow {
            position: absolute;
            bottom: -10px;
            width: 180px;
            height: 40px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            filter: blur(8px);
        }

        /* Base del ventilador */
        .fan-base {
            width: 160px;
            height: 35px;
            background: linear-gradient(to bottom, var(--fan-color-light), var(--fan-color-main));
            border-radius: 50% 50% 10px 10px;
            position: relative;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.1);
            z-index: 2;
        }

        /* Poste del ventilador */
        .fan-pole {
            width: 30px;
            height: 120px;
            background: linear-gradient(to right, var(--fan-color-dark), var(--fan-color-light), var(--fan-color-dark));
            position: relative;
            z-index: 1;
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(0,0,0,0.5);
            margin-bottom: -10px; /* Conectar con la base */
        }

        /* Cabeza (Motor y aspas) */
        .fan-head {
            position: absolute;
            top: 20px;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        /* Carcasa trasera del motor */
        .fan-motor {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, var(--fan-color-light), var(--fan-color-dark));
            border-radius: 50%;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
            z-index: 1;
        }

        /* Contenedor de aspas (el que rota) */
        #fan-blades {
            position: absolute;
            width: 240px;
            height: 240px;
            z-index: 2;
            will-change: transform;
            transform-origin: center center;
            /* El blur dinámico se aplica desde JS */
        }

        /* Aspas individuales */
        .blade {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 110px;
            height: 50px;
            background: linear-gradient(135deg, rgba(230,235,240,0.9), rgba(180,190,200,0.9));
            border-radius: 10px 50px 10px 50px;
            transform-origin: 0% 50%;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.5), inset -2px -2px 5px rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .blade:nth-child(1) { transform: translateY(-50%) rotate(0deg); }
        .blade:nth-child(2) { transform: translateY(-50%) rotate(120deg); }
        .blade:nth-child(3) { transform: translateY(-50%) rotate(240deg); }

        /* Tapa central */
        .fan-center {
            position: absolute;
            width: 45px;
            height: 45px;
            background: radial-gradient(circle at 40% 40%, #e8ecef, #8b95a5);
            border-radius: 50%;
            z-index: 3;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .fan-center::after {
            content: '';
            width: 15px;
            height: 15px;
            background: radial-gradient(circle, #666, #222);
            border-radius: 50%;
        }

        /* Rejilla protectora frontal */
        .fan-grill {
            position: absolute;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 6px solid var(--grill-color);
            z-index: 4;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset 0 5px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Círculos concéntricos de la rejilla */
        .grill-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid var(--grill-color);
        }
        .grill-circle-1 { width: 200px; height: 200px; }
        .grill-circle-2 { width: 140px; height: 140px; }
        .grill-circle-3 { width: 80px; height: 80px; }

        /* Líneas radiales de la rejilla */
        .grill-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: var(--grill-color);
            transform-origin: center;
        }
        .grill-line:nth-child(4) { transform: rotate(0deg); }
        .grill-line:nth-child(5) { transform: rotate(30deg); }
        .grill-line:nth-child(6) { transform: rotate(60deg); }
        .grill-line:nth-child(7) { transform: rotate(90deg); }
        .grill-line:nth-child(8) { transform: rotate(120deg); }
        .grill-line:nth-child(9) { transform: rotate(150deg); }

        /* --- CONTROLES (Glassmorphism) --- */
        #controls {
            position: absolute;
            bottom: 30px;
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 30;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(0,0,0,0.1);
            height: 8px;
            border-radius: 4px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.4);
            color: #222;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }

        button:hover {
            background: rgba(255,255,255,0.6);
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.1);
        }

        button:active {
            transform: translateY(1px);
        }

        /* --- OBJETOS FÍSICOS --- */
        .paper {
            position: absolute;
            width: 35px;
            height: 45px;
            background: #ffffff;
            border-radius: 2px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.15);
            /* Gradiente sutil para parecer papel */
            background-image: linear-gradient(120deg, #fff 0%, #f4f4f4 100%);
            will-change: transform;
        }
        
        /* Detalles del papel (líneas falsas) */
        .paper::before {
            content: '';
            position: absolute;
            top: 8px; left: 5px; right: 5px;
            height: 1px;
            background: rgba(0,0,255,0.1);
            box-shadow: 0 6px 0 rgba(0,0,255,0.1), 0 12px 0 rgba(0,0,255,0.1), 0 18px 0 rgba(0,0,255,0.1);
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(1px);
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Escalar ventilador en pantallas muy pequeñas */
        @media (max-height: 600px) {
            #fan-wrapper {
                transform: scale(0.75);
                transform-origin: bottom center;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Capa de física -->
        <div id="particles-container"></div>
        <div id="papers-container"></div>

        <!-- Ventilador -->
        <div id="fan-wrapper">
            <div class="fan-head">
                <div class="fan-motor"></div>
                
                <div id="fan-blades">
                    <div class="blade"></div>
                    <div class="blade"></div>
                    <div class="blade"></div>
                </div>
                
                <div class="fan-center"></div>
                
                <div class="fan-grill">
                    <div class="grill-circle grill-circle-1"></div>
                    <div class="grill-circle grill-circle-2"></div>
                    <div class="grill-circle grill-circle-3"></div>
                    <div class="grill-line"></div>
                    <div class="grill-line"></div>
                    <div class="grill-line"></div>
                    <div class="grill-line"></div>
                    <div class="grill-line"></div>
                    <div class="grill-line"></div>
                </div>
            </div>
            <div class="fan-pole"></div>
            <div class="fan-base"></div>
            <div class="fan-shadow"></div>
        </div>

        <!-- Interfaz de Control -->
        <div id="controls">
            <div class="slider-container">
                <div class="slider-header">
                    <span>Velocidad</span>
                    <span id="speed-label">0 (Apagado)</span>
                </div>
                <input type="range" id="speed-slider" min="0" max="5" value="0" step="1">
            </div>
            <div class="buttons">
                <button id="btn-add">Añadir Papeles</button>
                <button id="btn-clear">Quitar Todos</button>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO Y VARIABLES GLOBALES ---
        const config = {
            friction: 0.97,       // Resistencia del suelo
            airFriction: 0.99,    // Fricción al rotar
            restitution: -0.7,    // Rebote en las paredes (mantiene 70% de energía)
            maxSpeed: 5,
            fps: 60
        };

        const state = {
            targetSpeedLevel: 0,
            currentSpeed: 0,      // Velocidad interpolada del ventilador
            fanRotation: 0,
            papers: [],
            particles: [],
            width: window.innerWidth,
            height: window.innerHeight,
            fanCenter: { x: 0, y: 0 }
        };

        // --- REFERENCIAS DOM ---
        const els = {
            app: document.getElementById('app'),
            fanWrapper: document.getElementById('fan-wrapper'),
            fanBlades: document.getElementById('fan-blades'),
            papersContainer: document.getElementById('papers-container'),
            particlesContainer: document.getElementById('particles-container'),
            slider: document.getElementById('speed-slider'),
            speedLabel: document.getElementById('speed-label'),
            btnAdd: document.getElementById('btn-add'),
            btnClear: document.getElementById('btn-clear')
        };

        const speedLabels = ["0 (Apagado)", "1 (Muy Lento)", "2 (Lento)", "3 (Medio)", "4 (Rápido)", "5 (Turbo)"];
        const bgColors = [
            ['#e0eaf5', '#b8c6db'], // 0
            ['#ddeaf3', '#a7c0d8'], // 1
            ['#d3e6f0', '#95b7d4'], // 2
            ['#c7e1ee', '#83aed0'], // 3
            ['#bbdcea', '#71a5cd'], // 4
            ['#add6e7', '#5f9cc9']  // 5
        ];

        // --- INICIALIZACIÓN ---
        function init() {
            updateDimensions();
            window.addEventListener('resize', updateDimensions);
            
            // Eventos UI
            els.slider.addEventListener('input', (e) => {
                state.targetSpeedLevel = parseInt(e.target.value);
                els.speedLabel.innerText = speedLabels[state.targetSpeedLevel];
                updateBackground();
            });

            els.btnAdd.addEventListener('click', () => addPapers(5));
            els.btnClear.addEventListener('click', () => {
                state.papers.forEach(p => p.el.remove());
                state.papers = [];
            });

            // Añadir papeles iniciales
            addPapers(8);

            // Bucle principal
            requestAnimationFrame(gameLoop);
        }

        function updateDimensions() {
            state.width = window.innerWidth;
            state.height = window.innerHeight;
            
            // Calcular centro geométrico de la cabeza del ventilador en la pantalla
            const rect = els.fanWrapper.getBoundingClientRect();
            // La cabeza del ventilador está a ~150px desde la parte superior del wrapper
            state.fanCenter.x = rect.left + rect.width / 2;
            state.fanCenter.y = rect.top + 150; 
        }

        function updateBackground() {
            const colors = bgColors[state.targetSpeedLevel];
            document.body.style.background = `linear-gradient(135deg, ${colors[0]} 0%, ${colors[1]} 100%)`;
        }

        // --- SISTEMA DE PAPELES (Física) ---
        class Paper {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.angle = Math.random() * 360;
                this.vAngle = (Math.random() - 0.5) * 10;
                this.mass = 0.8 + Math.random() * 0.4;
                this.width = 35;
                this.height = 45;
                
                this.el = document.createElement('div');
                this.el.className = 'paper';
                els.papersContainer.appendChild(this.el);
                
                this.updateDOM();
            }

            updateDOM() {
                // translate3d para aceleración por GPU
                this.el.style.transform = `translate3d(${this.x - this.width/2}px, ${this.y - this.height/2}px, 0) rotate(${this.angle}deg)`;
            }
        }

        function addPapers(count) {
            for (let i = 0; i < count; i++) {
                // Aparecen de forma aleatoria por la pantalla
                const x = 50 + Math.random() * (state.width - 100);
                const y = 50 + Math.random() * (state.height - 300); // Evitar que aparezcan sobre los controles
                state.papers.push(new Paper(x, y));
            }
        }

        // --- SISTEMA DE PARTÍCULAS (Aire) ---
        class Particle {
            constructor() {
                this.x = state.fanCenter.x + (Math.random() - 0.5) * 150;
                this.y = state.fanCenter.y + (Math.random() - 0.5) * 150;
                this.vx = 0;
                this.vy = 0;
                this.life = 1.0;
                this.decay = 0.02 + Math.random() * 0.03;
                
                this.el = document.createElement('div');
                this.el.className = 'particle';
                els.particlesContainer.appendChild(this.el);
            }

            updateDOM() {
                this.el.style.transform = `translate3d(${this.x}px, ${this.y}px, 0)`;
                this.el.style.opacity = this.life;
            }
        }

        // --- BUCLE PRINCIPAL (Motor Físico y Render) ---
        function gameLoop() {
            updateFanState();
            applyPhysics();
            updateParticles();
            
            requestAnimationFrame(gameLoop);
        }

        function updateFanState() {
            // Aceleración y desaceleración progresiva del motor
            const diff = state.targetSpeedLevel - state.currentSpeed;
            state.currentSpeed += diff * 0.02; // ease-out (suavizado)

            // Velocidad base de rotación (RPM) en base al nivel actual
            const rotationSpeed = state.currentSpeed * 12; // grados por frame
            
            state.fanRotation = (state.fanRotation + rotationSpeed) % 360;
            
            // Efecto visual: Motion blur en las aspas
            const blurAmount = state.currentSpeed > 2 ? (state.currentSpeed - 2) * 1.5 : 0;
            els.fanBlades.style.filter = `blur(${blurAmount}px)`;
            
            // Actualizar rotación DOM
            els.fanBlades.style.transform = `rotate(${state.fanRotation}deg)`;

            // Efecto visual: Vibración del ventilador entero
            if (state.currentSpeed > 0.5) {
                const vibrationX = (Math.random() - 0.5) * state.currentSpeed * 1.5;
                const vibrationY = (Math.random() - 0.5) * state.currentSpeed * 1.5;
                els.fanWrapper.style.transform = `translate(${vibrationX}px, ${vibrationY}px)`;
            } else {
                els.fanWrapper.style.transform = `translate(0px, 0px)`;
            }
        }

        function applyPhysics() {
            const windPower = state.currentSpeed * 1.5; // Multiplicador de fuerza base

            state.papers.forEach(p => {
                // 1. Calcular Viento (Fuerza Radial + Fuerza Tangencial/Vórtice)
                const dx = p.x - state.fanCenter.x;
                const dy = p.y - state.fanCenter.y;
                const distSq = dx*dx + dy*dy;
                const dist = Math.sqrt(distSq);

                if (windPower > 0.1 && dist > 1) {
                    // Direccion normalizada
                    const nx = dx / dist;
                    const ny = dy / dist;
                    
                    // Direccion tangencial (para efecto remolino)
                    const tx = -ny;
                    const ty = nx;

                    // La fuerza disminuye con el cuadrado de la distancia, pero limitamos para no hacerlo infinito
                    // Usamos una constante de atenuación para que se sienta en toda la pantalla
                    const forceAttenuation = 20000 / (distSq + 5000); 
                    
                    const radialForce = windPower * forceAttenuation * (1 / p.mass);
                    const swirlForce = (windPower * 0.5) * forceAttenuation * (1 / p.mass);

                    p.vx += nx * radialForce + tx * swirlForce;
                    p.vy += ny * radialForce + ty * swirlForce;

                    // El viento también los hace girar
                    p.vAngle += (Math.random() - 0.5) * radialForce * 2;
                }

                // 2. Aplicar Fricción
                p.vx *= config.friction;
                p.vy *= config.friction;
                p.vAngle *= config.airFriction;

                // 3. Actualizar Posición
                p.x += p.vx;
                p.y += p.vy;
                p.angle += p.vAngle;

                // 4. Colisiones con los bordes (Pantalla)
                const marginX = p.width / 2;
                const marginY = p.height / 2;

                if (p.x < marginX) {
                    p.x = marginX;
                    p.vx *= config.restitution;
                    p.vAngle += p.vy * 0.5; // Efecto de giro al golpear pared
                } else if (p.x > state.width - marginX) {
                    p.x = state.width - marginX;
                    p.vx *= config.restitution;
                    p.vAngle -= p.vy * 0.5;
                }

                if (p.y < marginY) {
                    p.y = marginY;
                    p.vy *= config.restitution;
                    p.vAngle -= p.vx * 0.5;
                } else if (p.y > state.height - marginY) {
                    p.y = state.height - marginY;
                    p.vy *= config.restitution;
                    p.vAngle += p.vx * 0.5;
                }

                // 5. Renderizar
                p.updateDOM();
            });
        }

        function updateParticles() {
            // Generar nuevas partículas si el ventilador está encendido
            if (state.currentSpeed > 0.5 && Math.random() < state.currentSpeed * 0.2) {
                // Límite máximo de partículas por rendimiento
                if (state.particles.length < 30) {
                    state.particles.push(new Particle());
                }
            }

            // Actualizar partículas existentes
            const windPower = state.currentSpeed * 2;

            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                
                const dx = p.x - state.fanCenter.x;
                const dy = p.y - state.fanCenter.y;
                const distSq = dx*dx + dy*dy;
                const dist = Math.sqrt(distSq) || 1;

                const nx = dx / dist;
                const ny = dy / dist;
                const tx = -ny;
                const ty = nx;

                const forceAttenuation = 25000 / (distSq + 2000);
                
                p.vx += (nx * windPower + tx * (windPower * 0.3)) * forceAttenuation;
                p.vy += (ny * windPower + ty * (windPower * 0.3)) * forceAttenuation;

                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;

                if (p.life <= 0 || p.x < 0 || p.x > state.width || p.y < 0 || p.y > state.height) {
                    // Eliminar del DOM y array
                    p.el.remove();
                    state.particles.splice(i, 1);
                } else {
                    p.updateDOM();
                }
            }
        }

        // --- ARRANQUE ---
        window.onload = init;

    </script>
</body>
</html>
